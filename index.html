<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobra Mjuza - Svijet Glazbe</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background-color: #004e98;
            background-image: linear-gradient(to bottom, #1068c3, #002b66);
            font-family: Tahoma, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
            min-height: 0;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 60px;
            filter: drop-shadow(3px 3px 6px rgba(0, 0, 0, 0.7));
        }

        .retro-player-window {
            background: #ece9d8;
            border: 2px solid;
            border-color: #ffffff #002266 #002266 #ffffff;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: #000;
            flex-shrink: 0;
        }

        #audioElement {
            display: none;
        }

        .retro-info-bar {
            background: #ffffff;
            border: 1px inset #716f64;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: bold;
            color: #002266;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            background: #d4d0c8;
            border: 1px inset #716f64;
            height: 12px;
            margin-bottom: 4px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            background: linear-gradient(to right, #0055ea, #2680eb);
            height: 100%;
            width: 0%;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #333;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .retro-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #d4d0c8;
            padding: 4px;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
        }

        .retro-btn {
            background: #ece9d8;
            border: 2px solid;
            border-color: #ffffff #716f64 #716f64 #ffffff;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        .retro-btn:active {
            border-color: #716f64 #ffffff #ffffff #716f64;
            padding: 5px 9px 3px 11px;
        }

        h2 {
            font-size: 13px;
            text-shadow: 1px 1px 2px #000;
            border-bottom: 2px solid #2680eb;
            padding-bottom: 3px;
            margin: 0 0 5px 0;
            flex-shrink: 0;
        }

        .playlist-box {
            background: #000;
            border: 2px inset #716f64;
            flex: 1;
            min-height: 80px;
            overflow-y: auto;
            padding: 4px;
            font-family: Tahoma, sans-serif;
            font-size: 11px;
        }

        .playlist-item {
            padding: 3px 5px;
            color: #00ff00;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .playlist-item:hover {
            background: #002266;
            color: #ffffff;
        }

        .playlist-item.active {
            background: #0055ea;
            color: #ffffff;
            font-weight: bold;
        }

        .contact-text {
            text-align: center;
            font-size: 11px;
            color: #ffffff;
            margin-top: 6px;
            margin-bottom: 4px;
            text-shadow: 1px 1px 2px #000;
            flex-shrink: 0;
        }

        .contact-text a {
            color: #b0d0e6;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #b0d0e6;
            padding: 5px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 1px 1px 2px #000;
            flex-shrink: 0;
        }

        footer a {
            color: #b0d0e6;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="logo-container">
            <img src="logo.png" alt="Dobra Mjuza Logo">
        </div>

        <div class="retro-player-window">
            
            <audio id="audioElement"></audio>

            <div class="retro-info-bar" id="current-song-title">Nema odabrane pjesme</div>

            <div class="progress-container" id="progressContainer" onclick="seekAudio(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">00:00</span>
                <span id="durationTime">00:00</span>
            </div>

            <div class="retro-controls">
                <button class="retro-btn" onclick="playPrevious()">⏮ Prethodna</button>
                <button class="retro-btn" id="playPauseBtn" onclick="togglePlay()">▶ Play</button>
                <button class="retro-btn" onclick="playNext()">⏭ Sljedeća</button>
            </div>
        </div>

        <h2>Winamp Playlist (<span id="songCount">0</span> pjesama)</h2>
        <div class="playlist-box" id="playlistContainer"></div>

    </div>

    <div class="contact-text">
        Želite li čuti i neku Vama dragu pjesmu? Javite nam! <a href="mailto:dobra.mjuza@net.hr">dobra.mjuza@net.hr</a>
    </div>

    <footer>
        &copy; 2026 - 2026 Dobra Mjuza | Powered by <a href="https://static.wixstatic.com/media/7b76f9_dbd99645954d41278ccdbea7478fb2f6~mv2.png/v1/fill/w_982,h_629,al_c,q_90,enc_avif,quality_auto/7b76f9_dbd99645954d41278ccdbea7478fb2f6~mv2.png" target="_blank">Vanjaka</a>
    </footer>

    <script>
        const baseURL = "https://github.com/vanjaka-korporacija/dobra-mjuza/releases/download/v1.0/";

        // Definiramo lijepi naziv za prikaz i točan naziv fajla na GitHubu
        const mp3Files = [
            { name: "A Seagull & Clouds - Himiko Kituchi", file: "A.Seagull.Clouds.-.Himiko.Kituchi.mp3" },
            { name: "Baby Talk - Himiko Kituchi", file: "Baby.Talk.-.Himiko.Kituchi.mp3" },
            { name: "Blojska Rapsodija - Valentino Bošković", file: "Blojska.Rapsodija.-.Valentino.Boskovic.mp3" },
            { name: "Brijuni - Dubioza Kolektiv", file: "Brijuni.-.Dubioza.Kolektiv.mp3" },
            { name: "Chile - Gdinjko", file: "Chile.-.Gdinjko.mp3" },
            { name: "Devojko Mala - Đuza Stojiljković", file: "Devojko.Mala.-.Duza.Stojiljkovic.mp3" },
            { name: "Drama - Let 3", file: "Drama.-.Let.3.mp3" },
            { name: "Droga - Let 3", file: "Droga.-.Let.3.mp3" },
            { name: "Ducky Ducky - Himiko Kituchi", file: "Ducky.Ducky.-.Himiko.Kituchi.mp3" },
            { name: "Fluffy - Himiko Kituchi", file: "Fluffy.-.Himiko.Kituchi.mp3" },
            { name: "Flying Beagle - Himiko Kituchi", file: "Flying.Beagle.-.Himiko.Kituchi.mp3" },
            { name: "Girl - The Beatles", file: "Girl.-.The.Beatles.mp3" },
            { name: "Golubovi - Ivo Robić", file: "Golubovi.-.Ivo.Robic.mp3" },
            { name: "Heroyix - TBF", file: "Heroyix.-.TBF.mp3" },
            { name: "Hit The Road Jack - Ray Charles", file: "Hit.The.Road.Jack.-.Ray.Charles.mp3" },
            { name: "Idem i Ja...Ne, Ti Ne - Kvartet 4M", file: "Idem.i.Ja.Ne.Ti.Ne.-.Kvartet.4M.mp3" },
            { name: "If I Fell - The Beatles", file: "If.I.Fell.-.The.Beatles.mp3" },
            { name: "Ja Ljubim Je, Je - Kvartet 4M", file: "Ja.Ljubim.Je.Je.-.Kvartet.4M.mp3" },
            { name: "K'o Svakog Dana - Miro Ungar", file: "K.o.Svakog.Dana.-.Miro.Ungar.mp3" },
            { name: "Kažu - Dubioza Kolektiv", file: "Kazu.-.Dubioza.Kolektiv.mp3" },
            { name: "Look Your Back! - Himiko Kituchi", file: "Look.Your.Back.-.Himiko.Kituchi.mp3" },
            { name: "Malena - Idoli", file: "Malena.-.Idoli.mp3" },
            { name: "Maljčiki - Idoli", file: "Maljciki.-.Idoli.mp3" },
            { name: "Moja Posljednja i Prva Ljubavi - Tereza Kesovija", file: "Moja.Posljednja.i.Prva.Ljubavi.-.Tereza.Kesovija.mp3" },
            { name: "Mr Blue Sky - Electric Light Orchestra", file: "Mr.Blue.Sky.-.Electric.Light.Orchestra.mp3" },
            { name: "My Way - Frank Sinatra", file: "My.Way.-.Frank.Sinatra.mp3" },
            { name: "Neka Cijeli Ovaj Svijet (Jalta, Jalta) - Alfi Kabiljo", file: "Neka.Cijeli.Ovaj.Svijet.Jalta.Jalta.-.Alfi.Kabiljo.mp3" },
            { name: "Ni Ti, Ni Ja - Gabi Novak", file: "Ni.Ti.Ni.Ja.-.Gabi.Novak.mp3" },
            { name: "Nima Splita Do Splita - Tereza Kesovija", file: "Nima.Splita.Do.Splita.-.Tereza.Kesovija.mp3" },
            { name: "Nono - Tereza Kesovija", file: "Nono.-.Tereza.Kesovija.mp3" },
            { name: "Oluja - Josipa Lisac", file: "Oluja.-.Josipa.Lisac.mp3" },
            { name: "Ostavi mi Barem Nešto - Gabi Novak", file: "Ostavi.mi.Barem.Nesto.-.Gabi.Novak.mp3" },
            { name: "Pamtim Samo Sretne Dane - Gabi Novak", file: "Pamtim.Samo.Sretne.Dane.-.Gabi.Novak.mp3" },
            { name: "Plastika - Idoli", file: "Plastika.-.Idoli.mp3" },
            { name: "Pop Muzik - M", file: "Pop.Muzik.-.M.mp3" },
            { name: "Prijatelji Stari Gdje Ste - Tereza Kesovija", file: "Prijatelji.Stari.Gdje.Ste.-.Tereza.Kesovija.mp3" },
            { name: "Riječke Pičke - Let 3", file: "Rijecke.Picke.-.Let.3.mp3" },
            { name: "Sam u Vodi - Let 3", file: "Sam.u.Vodi.-.Let.3.mp3" },
            { name: "Sam u Vodi - Tereza Kesovija i Let 3", file: "Sam.u.Vodi.-.Tereza.Kesovija.i.Let.3.mp3" },
            { name: "Samo Jednom se Ljubi - Ivo Robić", file: "Samo.Jednom.se.Ljubi.-.Ivo.Robic.mp3" },
            { name: "Sand Storm - Himiko Kituchi", file: "Sand.Storm.-.Himiko.Kituchi.mp3" },
            { name: "Schwüle Über Europa - Idoli", file: "Schwule.Uber.Europa.-.Idoli.mp3" },
            { name: "Serenada Opatiji - Ivo Robić", file: "Serenada.Opatiji.-.Ivo.Robic.mp3" },
            { name: "Smak Svita - TBF", file: "Smak.Svita.-.TBF.mp3" },
            { name: "Sretan Put - Gabi Novak", file: "Sretan.Put.-.Gabi.Novak.mp3" },
            { name: "Stranci u Noći - Ivo Robić", file: "Stranci.u.Noci.-.Ivo.Robic.mp3" },
            { name: "Sudnji Don - Valentino Bošković", file: "Sudnji.Don.-.Valentino.Boskovic.mp3" },
            { name: "Sviradu Jazz - Gdinjko", file: "Sviradu.Jazz.-.Gdinjko.mp3" },
            { name: "Sviraj Mi Sviraj - Tereza Kesovija", file: "Sviraj.Mi.Sviraj.-.Tereza.Kesovija.mp3" },
            { name: "Šejn - Haustor", file: "Sejn.-.Haustor.mp3" },
            { name: "The Second Summer - Himiko Kituchi", file: "The.Second.Summer.-.Himiko.Kituchi.mp3" },
            { name: "U Gdinju je Ray - Gdinjko", file: "U.Gdinju.je.Ray.-.Gdinjko.mp3" },
            { name: "Vjeran Pas - Let 3", file: "Vjeran.Pas.-.Let.3.mp3" },
            { name: "Yellow Submarine - The Beatles", file: "Yellow.Submarine.-.The.Beatles.mp3" },
            { name: "Ena - Haustor", file: "Ena.-.Haustor.mp3" },
            { name: "Radnička Klasa Odlazi u Raj Pt. 2 - Haustor", file: "Radnicka.Klasa.Odlazi.u.Raj.Pt.2.-.Haustor.mp3" },
            { name: "Hodaj - Porto Morto i Rundek", file: "Hodaj.-.Porto.Morto.i.Rundek.mp3" },
            { name: "Meni se Skače - M.O.R.T.", file: "Meni.se.Skace.MORT.mp3" }
        ].map(song => ({
            name: song.name,
            url: baseURL + encodeURIComponent(song.file)
        }));

        let currentIndex = 0;
        const audio = document.getElementById('audioElement');
        let isPlaying = false;

        const playlistContainer = document.getElementById('playlistContainer');
        const titleBar = document.getElementById('current-song-title');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');

        function initPlayer() {
            document.getElementById('songCount').innerText = mp3Files.length;
            buildPlaylistUI();
            if (mp3Files.length > 0) {
                loadSong(0);
            }
        }

        function buildPlaylistUI() {
            playlistContainer.innerHTML = "";
            mp3Files.forEach((song, index) => {
                let item = document.createElement('div');
                item.className = 'playlist-item' + (index === currentIndex ? ' active' : '');
                item.id = `song-item-${index}`;
                item.innerHTML = `<span>${index + 1}. ${song.name}</span>`;
                item.onclick = () => {
                    currentIndex = index;
                    loadSong(currentIndex);
                    playAudio();
                };
                playlistContainer.appendChild(item);
            });
        }

        function loadSong(index) {
            currentIndex = index;
            audio.src = mp3Files[currentIndex].url;
            titleBar.innerText = `Sada svira: ${mp3Files[currentIndex].name}`;
            
            document.querySelectorAll('.playlist-item').forEach((el, idx) => {
                if (idx === currentIndex) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        function playAudio() {
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.innerText = "⏸ Pauza";
            }).catch(e => {
                console.log("Klikni Play za početak reprodukcije.");
            });
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playPauseBtn.innerText = "▶ Play";
            } else {
                playAudio();
            }
        }

        function playNext() {
            currentIndex++;
            if (currentIndex >= mp3Files.length) currentIndex = 0;
            loadSong(currentIndex);
            playAudio();
        }

        function playPrevious() {
            currentIndex--;
            if (currentIndex < 0) currentIndex = mp3Files.length - 1;
            loadSong(currentIndex);
            playAudio();
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                currentTimeEl.innerText = formatTime(audio.currentTime);
                durationTimeEl.innerText = formatTime(audio.duration);
            }
        };

        audio.onended = () => {
            playNext();
        };

        function seekAudio(event) {
            const container = document.getElementById('progressContainer');
            const rect = container.getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = pos * audio.duration;
            }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        initPlayer();
    </script>

</body>
</html>
